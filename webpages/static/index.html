<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>兼爱</title>
    <script type="module">
      import init from "/wasm.js";
      init();
    </script>
    <link rel="shortcut icon" href="#" />
    <style>
* {
  box-sizing: border-box;
}

.hnav ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
}
.hnav li {
  display: inline;
}

.container {
  width: 600px;
  height: 100px;
  position: relative;
}
.base, .mask {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
}
.mask {
  z-index: 10;
}

/* Style the header */
header {
  background-color: #666;
  padding: 30px;
  text-align: center;
  font-size: 35px;
  color: white;
}

/* Container for flexboxes */
section {
  display: -webkit-flex;
  display: flex;
}

/* Style the navigation menu */
nav {
  -webkit-flex: 1;
  -ms-flex: 1;
  flex: 1;
  background: #ccc;
  padding: 20px;
  overflow-y: scroll;
}

/* Style the list inside the menu */
nav ul {
  list-style-type: none;
  padding: 0;
}

/* Style the content */
article {
  -webkit-flex: 3;
  -ms-flex: 3;
  flex: 3;
  background-color: #f1f1f1;
  padding: 10px;
}

/* Style the footer */
footer {
  background-color: #777;
  padding: 10px;
  text-align: center;
  color: white;
}

/* Responsive layout - makes the menu and the content (inside the section) sit on top of each other instead of next to each other */
@media (max-width: 600px) {
  section {
    -webkit-flex-direction: column;
    flex-direction: column;
  }
}

.grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-auto-columns: max-content;
}
</style>
  </head>

</html>
